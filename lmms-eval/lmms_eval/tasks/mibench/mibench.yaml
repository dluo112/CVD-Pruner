task: mibench
dataset_path: json
dataset_kwargs:
  data_files:
    test: data/mibench/multi_image_instruction.json
test_split: test

output_type: generate_until

doc_to_visual: !function utils.mii_doc_to_visual
doc_to_text: !function utils.mii_doc_to_text
doc_to_target: !function utils.mii_doc_to_target
process_results: !function utils.mii_process_results

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nSelect the best option and answer using the option text only. Do not explain."

generation_kwargs:
  max_new_tokens: 24
  temperature: 0
  do_sample: false

metric_list:
  - metric: acc
    aggregation: !function utils.mii_aggregation
    higher_is_better: true

metadata:
  version: 0.0